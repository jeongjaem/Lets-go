<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse Board Setup</title>
  <style>
    :root {
      --bg: #08131b;
      --panel: rgba(8, 24, 33, 0.82);
      --line: rgba(113, 201, 216, 0.18);
      --text: #edf7fb;
      --muted: rgba(237, 247, 251, 0.7);
      --accent: #63e2c3;
      --accent-2: #ffb85c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      font-family: "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(99, 226, 195, 0.14), transparent 30%),
        radial-gradient(circle at top right, rgba(255, 184, 92, 0.14), transparent 24%),
        linear-gradient(180deg, #061018, #091c28 52%, #08131b);
    }

    .panel {
      width: min(720px, 100%);
      padding: clamp(24px, 4vw, 40px);
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--panel);
      backdrop-filter: blur(16px);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.34);
    }

    .eyebrow,
    code {
      color: var(--muted);
    }

    .eyebrow {
      margin: 0 0 12px;
      font-size: 0.8rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 7vw, 4.4rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
    }

    p,
    li {
      color: var(--muted);
      line-height: 1.7;
      font-size: 1rem;
    }

    ol {
      padding-left: 20px;
      margin: 20px 0 0;
    }

    .link-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 180px;
      padding: 14px 18px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--text);
      text-decoration: none;
    }

    .primary {
      background: linear-gradient(135deg, var(--accent), #4ea7ff);
      color: #041118;
      border: 0;
      font-weight: 700;
    }

    .secondary {
      background: rgba(255, 255, 255, 0.03);
    }
  </style>
</head>
<body>
  <main class="panel">
    <p class="eyebrow">Static file notice</p>
    <h1>이 파일은 이제 메인 앱이 아닙니다.</h1>
    <p>
      현재 프로젝트의 실제 프론트엔드는 <code>frontend/</code>의 Next.js 앱이고,
      실시간 가격 서버는 <code>backend/</code>의 Express + Socket.IO 서버입니다.
    </p>
    <ol>
      <li><code>npm run dev:backend</code>로 백엔드를 실행합니다.</li>
      <li><code>npm run dev:frontend</code>로 프론트를 실행합니다.</li>
      <li><code>http://localhost:3000</code>에서 새 사이트를 확인합니다.</li>
    </ol>
    <div class="link-row">
      <a class="primary" href="http://localhost:3000">frontend 열기</a>
      <a class="secondary" href="/README.md">README 보기</a>
    </div>
  </main>
</body>
</html>
